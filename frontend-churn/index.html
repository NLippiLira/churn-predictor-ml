<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Churn Predictor</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="container">
    <h1>📊 Churn Predictor</h1>

    <form id="form">
        <input type="number" id="tenure" placeholder="Meses como cliente" required>

        <input type="number" id="MonthlyCharges" placeholder="Pago mensual" required>

        <select id="Contract">
            <option value="Month-to-month">Mensual</option>
            <option value="One year">1 año</option>
            <option value="Two year">2 años</option>
        </select>

        <select id="InternetService">
            <option value="DSL">DSL</option>
            <option value="Fiber optic">Fibra</option>
            <option value="No">Sin internet</option>
        </select>

        <select id="PaymentMethod">
            <option value="Electronic check">Electronic check</option>
            <option value="Mailed check">Mailed check</option>
            <option value="Bank transfer (automatic)">Transferencia</option>
            <option value="Credit card (automatic)">Tarjeta</option>
        </select>

        <button type="submit">Predecir</button>
    </form>

    <div id="resultado"></div>
</div>

<script src="app.js"></script>
</body>
</html>
